[General]
# Ensure PCAP writes instantly to disk to avoid data loss
**.pcapRecorder[*].alwaysFlush = true

# Limit total simulation duration
sim-time-limit = 30s

# Setup frame check sequence and CRC modes for stable INET traces
**.fcsMode = "computed"
**.crcMode = "computed"


# --------------------------------------------------------
# Scenario A: Standard One-to-One DNS Querying
# --------------------------------------------------------
[Config BasicDNSResolution]
network = BasicNetwork

# -- Server Configuration --
*.hostServer.app[0].useCache = true
*.hostServer.app[0].maxProcessingTime = 5ms
*.hostServer.app[0].typename = "DNSServer"
*.hostServer.app[0].isHierarchical = false
*.hostServer.app[0].bindPort = 53
# Reloads client query after this TTL expires
*.hostServer.app[0].defaultTtl = 5
*.hostServer.app[0].databaseConfig = xmldoc("local-dns-database.xml")
*.hostServer.app[0].minProcessingTime = 1ms

# -- Client Configuration --
*.hostClient.app[0].bootTime = 0.2s
*.hostClient.app[0].domainName = "www.example.com"
*.hostClient.app[0].targetServerIp = "hostServer"
*.hostClient.app[0].typename = "DNSClient"
# Port 0 must be avoided for ephemeral binding in this setup
*.hostClient.app[0].bindPort = 10000
*.hostClient.app[0].targetServerPort = 53

# -- Traffic Recording (PCAP) --
*.hostServer.pcapRecorder[0].pcapFile = "results/dnsServer-basic.pcap"
*.hostServer.numPcapRecorders = 1
*.hostClient.pcapRecorder[0].pcapFile = "results/client-basic.pcap"
*.hostClient.numPcapRecorders = 1


# --------------------------------------------------------
# Scenario B: Failing Resolution (NXDOMAIN)
# --------------------------------------------------------
[Config DNSNonExistent]
network = BasicNetwork

# -- Client Configuration --
*.hostClient.app[0].typename = "DNSClient"
# Intentionally querying a dead/non-existent record
*.hostClient.app[0].domainName = "does-not-exist.example"
# Port 0 must be avoided for ephemeral binding
*.hostClient.app[0].bindPort = 10000
*.hostClient.app[0].bootTime = 0.2s
*.hostClient.app[0].targetServerPort = 53
*.hostClient.app[0].targetServerIp = "hostServer"

# -- Server Configuration --
*.hostServer.app[0].isHierarchical = false
# TTL default left alone, irrelevant for NXDOMAIN responses
*.hostServer.app[0].databaseConfig = xmldoc("local-dns-database.xml")
*.hostServer.app[0].minProcessingTime = 1ms
*.hostServer.app[0].useCache = true
*.hostServer.app[0].maxProcessingTime = 5ms
*.hostServer.app[0].bindPort = 53
*.hostServer.app[0].typename = "DNSServer"

# -- Traffic Recording (PCAP) --
*.hostClient.numPcapRecorders = 1
*.hostServer.numPcapRecorders = 1
*.hostClient.pcapRecorder[0].pcapFile = "results/client-nxdomain.pcap"
*.hostServer.pcapRecorder[0].pcapFile = "results/dnsServer-nxdomain.pcap"

# --------------------------------------------------------
# Scenario C: Multi-Tier DNS Forwarding
# --------------------------------------------------------
[Config HierarchicalDNS]
network = HierarchicalNetwork

# -- Client Configuration (Talks to Local DNS) --
*.nodeClient.numApps = 2

*.nodeClient.app[0].bootTime = 0.2s
*.nodeClient.app[0].bindPort = 10000
*.nodeClient.app[0].typename = "DNSClient"
*.nodeClient.app[0].targetServerPort = 53
*.nodeClient.app[0].domainName = "www.sharif.ir"
*.nodeClient.app[0].targetServerIp = "dnsLocal"

*.nodeClient.app[1].bootTime = 5.0s
*.nodeClient.app[1].bindPort = 10001
*.nodeClient.app[1].typename = "DNSClient"
*.nodeClient.app[1].targetServerPort = 53
*.nodeClient.app[1].domainName = "www.sharif.ir"
*.nodeClient.app[1].targetServerIp = "dnsLocal"

# -- Top-Level/Root DNS (Authoritative) --
*.dnsRoot.app[0].isHierarchical = false
*.dnsRoot.app[0].defaultTtl = 20
*.dnsRoot.app[0].bindPort = 53
*.dnsRoot.app[0].minProcessingTime = 2ms
*.dnsRoot.app[0].databaseConfig = xmldoc("root-dns-database.xml")
*.dnsRoot.app[0].useCache = false
*.dnsRoot.app[0].maxProcessingTime = 8ms
*.dnsRoot.app[0].typename = "DNSServer"

# -- Local DNS Server (Proxies missing records) --
*.dnsLocal.app[0].typename = "DNSServer"
*.dnsLocal.app[0].parentPort = 53
*.dnsLocal.app[0].databaseConfig = xmldoc("local-dns-database.xml")
*.dnsLocal.app[0].isHierarchical = true
*.dnsLocal.app[0].maxProcessingTime = 5ms
*.dnsLocal.app[0].parentIpAddress = "dnsRoot"
*.dnsLocal.app[0].minProcessingTime = 1ms
*.dnsLocal.app[0].defaultTtl = 8
*.dnsLocal.app[0].bindPort = 53
*.dnsLocal.app[0].useCache = true

# -- Traffic Recording (PCAP) --
*.dnsRoot.pcapRecorder[0].pcapFile = "results/upperDns-hier.pcap"
*.dnsRoot.numPcapRecorders = 1
*.nodeClient.pcapRecorder[0].pcapFile = "results/client-hier.pcap"
*.dnsLocal.numPcapRecorders = 1
*.nodeClient.numPcapRecorders = 1
*.dnsLocal.pcapRecorder[0].pcapFile = "results/localDns-hier.pcap"