# =================================================================
# Bonus Scenario: DNS + FTP Integration
# =================================================================

[Config Bonus_Integration]
network = IntegratedNetwork
description = "DNS Resolution followed by FTP Upload"
sim-time-limit = 40s
**.crcMode = "computed"
**.fcsMode = "computed"

# -- DNS Server Setup --
*.dnsNode.numApps = 1
*.dnsNode.app[0].typename = "DNSServer"
*.dnsNode.app[0].bindPort = 53
*.dnsNode.app[0].databaseConfig = xmldoc("bonus-dns.xml")
*.dnsNode.app[0].defaultTtl = 60
*.dnsNode.app[0].isHierarchical = false

# -- FTP Server Setup --
*.ftpNode.numApps = 1
*.ftpNode.app[0].typename = "FtpServer"
*.ftpNode.app[0].controlPort = 21

# -- Client Setup (Dual Apps) --
*.clientNode.numApps = 2

# App 0: DNS Client
*.clientNode.app[0].typename = "DNSClient"
*.clientNode.app[0].bootTime = 0.5s
*.clientNode.app[0].domainName = "fileserver.example.com"
*.clientNode.app[0].targetServerIp = "dnsNode"
*.clientNode.app[0].targetServerPort = 53
*.clientNode.app[0].bindPort = 10000
*.clientNode.app[0].triggerFtp = true
*.clientNode.app[0].ftpModulePath = "^.app[1]"

# App 1: FTP Client (Waits for DNS)
*.clientNode.app[1].typename = "FtpClient"
*.clientNode.app[1].waitForDns = true
*.clientNode.app[1].ftpCommand = "STOR"
*.clientNode.app[1].filename = "data.txt"
*.clientNode.app[1].controlPort = 21
*.clientNode.app[1].dataPort = 2020
*.clientNode.app[1].username = "user"
*.clientNode.app[1].serverAddress = "" # Left blank intentionally, DNS provides it

# -- Traffic Recording (PCAP) --
*.clientNode.numPcapRecorders = 1
*.clientNode.pcapRecorder[0].pcapFile = "results/bonus_client.pcap"
*.clientNode.pcapRecorder[0].moduleNamePatterns = "eth[*]" 

*.ftpNode.numPcapRecorders = 1
*.ftpNode.pcapRecorder[0].pcapFile = "results/bonus_ftp.pcap"
*.ftpNode.pcapRecorder[0].moduleNamePatterns = "eth[*]"