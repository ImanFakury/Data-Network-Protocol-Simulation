[General]
network = FtpNetwork
sim-time-limit = 60s
**.crcMode = "computed"
**.fcsMode = "computed"


# --- Server Application Setup ---
*.serverHost.numApps = 1
*.serverHost.app[0].typename = "FtpServer"
*.serverHost.app[0].controlPort = 21

# --- Client Application Setup ---
*.clientHost.numApps = 1
*.clientHost.app[0].typename = "FtpClient"
*.clientHost.app[0].serverAddress = "serverHost" # INET will resolve this to the server's IP
*.clientHost.app[0].controlPort = 21
*.clientHost.app[0].dataPort = 2020
*.clientHost.app[0].username = "user"

# --- Packet Capture (PCAP) Setup ---
# This generates the .pcap files shown in your results folder for Wireshark analysis
*.clientHost.numPcapRecorders = 1
*.clientHost.pcapRecorder[0].pcapFile = "results/client_capture.pcap"
*.clientHost.pcapRecorder[0].moduleNamePatterns = "ppp[*]"  # <-- Fixed here

*.serverHost.numPcapRecorders = 1
*.serverHost.pcapRecorder[0].pcapFile = "results/server_capture.pcap"
*.serverHost.pcapRecorder[0].moduleNamePatterns = "ppp[*]"  # <-- Fixed here

# --- TCP Configuration ---
# Ensures the standard TCP implementation is used
**.tcp.typename = "Tcp"


# =================================================================
# Test Scenarios
# =================================================================

[Config Download_RETR]
description = "Client downloads data.txt from Server"
*.clientHost.app[0].ftpCommand = "RETR"
*.clientHost.app[0].filename = "data.txt"
# Note: For this to work, 'data.txt' must exist in the simulation directory 
# before running, as the server needs to read and send it.

[Config Upload_STOR]
description = "Client uploads data.txt to Server"
*.clientHost.app[0].ftpCommand = "STOR"
*.clientHost.app[0].filename = "data.txt"
# Note: For this to work, 'data.txt' must exist in the simulation directory 
# before running, as the client needs to read and send it.